<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="340" viewBox="0 0 1200 340" font-family='ui-monospace, SFMono-Regular, "JetBrains Mono", "Fira Code", Menlo, Consolas, monospace, "Apple Color Emoji", "Segoe UI Emoji"'>
  <title>lonely-v3n1x — profile header</title>
  <desc>Terminal-style hero card for lonely-v3n1x. Tokyo Night light palette.</desc>

  <defs>
    <radialGradient id="glow" cx="22%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#7dcfff" stop-opacity="0.16"/>
      <stop offset="55%" stop-color="#b39df3" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#e1e2e7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="handleGrad" x1="0" y1="0" x2="1" y2="0">
