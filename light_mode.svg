      <stop offset="55%" stop-color="#7a4df0"/>
      <stop offset="100%" stop-color="#d830d0"/>
    </linearGradient>
  </defs>

  <!-- canvas -->
  <rect width="1200" height="340" fill="#e1e2e7"/>
  <rect width="1200" height="340" fill="url(#glow)"/>

  <!-- inner panel -->
  <rect x="18" y="18" width="1164" height="304" rx="14" ry="14" fill="#f1f2f8" stroke="#c0caf5" stroke-width="1"/>

